<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0D0221">
    <title>WordQuest - Global Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-deep: #0D0221;
            --bg-dark: #160A3A;
            --bg-card: #1E1243;
            --bg-light: #2D1B69;
            --accent-neon: #00FFC2;
            --accent-pink: #FF2E97;
            --accent-gold: #FFB800;
            --accent-purple: #A855F7;
            --text-primary: #FFFFFF;
            --text-secondary: #B4A5D8;
            --text-dim: #7C6BA3;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(0, 255, 194, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 46, 151, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 30px;
            background: linear-gradient(180deg, var(--bg-dark) 0%, transparent 100%);
            border-radius: 20px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-neon) 0%, var(--accent-pink) 50%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .cloud-status {
            display: inline-block;
            background: rgba(0, 255, 194, 0.1);
            color: var(--accent-neon);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid rgba(0, 255, 194, 0.3);
            letter-spacing: 1px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: linear-gradient(135deg, var(--bg-card), var(--bg-light));
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-neon), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 12px;
            margin-bottom: 40px;
            padding: 0 10px;
        }

        .podium-card {
            flex: 1;
            max-width: 180px;
            text-align: center;
            border-radius: 20px;
            padding: 25px 15px 20px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        .podium-card:hover {
            transform: translateY(-5px);
        }

        .podium-card.gold {
            background: linear-gradient(135deg, rgba(255, 184, 0, 0.25), rgba(255, 184, 0, 0.05));
            border-color: rgba(255, 184, 0, 0.5);
            order: 2;
            min-height: 200px;
            box-shadow: 0 10px 40px rgba(255, 184, 0, 0.2);
        }

        .podium-card.silver {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.2), rgba(192, 192, 192, 0.05));
            border-color: rgba(192, 192, 192, 0.4);
            order: 1;
            min-height: 170px;
        }

        .podium-card.bronze {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.2), rgba(205, 127, 50, 0.05));
            border-color: rgba(205, 127, 50, 0.4);
            order: 3;
            min-height: 150px;
        }

        .podium-medal {
            font-size: 48px;
            margin-bottom: 12px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .podium-card.gold .podium-medal {
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .podium-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            word-break: break-word;
        }

        .podium-score {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 6px;
        }

        .podium-card.gold .podium-score {
            color: var(--accent-gold);
            text-shadow: 0 0 20px rgba(255, 184, 0, 0.5);
        }

        .podium-card.silver .podium-score {
            color: #C0C0C0;
        }

        .podium-card.bronze .podium-score {
            color: #CD7F32;
        }

        .podium-label {
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-title {
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .player-row {
            display: grid;
            grid-template-columns: 50px 1fr auto;
            gap: 15px;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, var(--bg-card), var(--bg-light));
            border-radius: 16px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s;
        }

        .player-row:hover {
            border-color: rgba(0, 255, 194, 0.3);
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0, 255, 194, 0.1);
        }

        .rank {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dim);
            text-align: center;
        }

        .player-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .player-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .player-date {
            font-size: 10px;
            color: var(--text-dim);
        }

        .player-score {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-neon);
            text-shadow: 0 0 10px rgba(0, 255, 194, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .empty-sub {
            font-size: 12px;
        }

        .refresh-btn {
            width: 100%;
            margin-top: 30px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(255, 184, 0, 0.2), rgba(255, 46, 151, 0.2));
            color: var(--accent-gold);
            border: 1px solid rgba(255, 184, 0, 0.3);
            border-radius: 16px;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 184, 0, 0.3);
        }

        .refresh-btn:active {
            transform: scale(0.98);
        }

        .game-link {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--accent-neon), var(--accent-purple));
            color: var(--bg-deep);
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 255, 194, 0.3);
        }

        .game-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 255, 194, 0.4);
        }

        .game-link:active {
            transform: scale(0.95);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent-neon);
            border-radius: 50%;
            animation: spin-loader 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin-loader {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .last-updated {
            text-align: center;
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 20px;
            font-style: italic;
        }

        @media (max-width: 500px) {
            .podium {
                gap: 8px;
            }
            .podium-card {
                padding: 20px 10px 15px;
            }
            .podium-medal {
                font-size: 36px;
            }
            .podium-name {
                font-size: 13px;
            }
            .podium-score {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏆 Leaderboard</div>
            <div class="subtitle">WordQuest Champions</div>
            <div class="cloud-status" id="cloudStatus">🌐 LIVE — Global Rankings</div>
        </div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-value" id="totalPlayers">0</div>
                <div class="stat-label">Total Wizards</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="topScore">0</div>
                <div class="stat-label">Top Score</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="avgScore">0</div>
                <div class="stat-label">Avg Score</div>
            </div>
        </div>

        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <div>Loading global rankings...</div>
        </div>

        <div id="podiumContainer" style="display: none;">
            <div class="podium" id="podium"></div>
        </div>

        <div id="listContainer" style="display: none;">
            <div class="section-title" id="listTitle">All Wizards</div>
            <div id="playerList"></div>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">🏜️</div>
            <div class="empty-text">No wizards on the board yet!</div>
            <div class="empty-sub">Be the first to play and claim the throne</div>
            <a href="index.html" class="game-link">🎮 Play WordQuest</a>
        </div>

        <button class="refresh-btn" onclick="loadLeaderboard()">🔄 Refresh Leaderboard</button>
        
        <div class="last-updated" id="lastUpdated"></div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="index.html" class="game-link">🎮 Play WordQuest</a>
        </div>
    </div>

    <script>
        // JSONBin.io Configuration
        const JSONBIN_CONFIG = {
            BIN_ID: '69ac1a3bae596e708f694c9e',
            API_KEY: '$2a$10$gcQCCyqzL8xU7Vum3uN84ebkMLYngo6KjM0j5gk8MVojAwvfPNsFe',
            BASE_URL: 'https://api.jsonbin.io/v3'
        };

        function isCloudConfigured() {
            return JSONBIN_CONFIG.BIN_ID !== 'YOUR_BIN_ID_HERE';
        }

        async function fetchCloudLeaderboard() {
            if (!isCloudConfigured()) return null;
            try {
                const res = await fetch(
                    `${JSONBIN_CONFIG.BASE_URL}/b/${JSONBIN_CONFIG.BIN_ID}/latest`,
                    { headers: { 'X-Access-Key': JSONBIN_CONFIG.API_KEY } }
                );
                if (res.ok) {
                    const json = await res.json();
                    const cloudData = json.record || {};
                    delete cloudData._init;
                    localStorage.setItem('wordQuest_GlobalLeaderboard', JSON.stringify(cloudData));
                    return cloudData;
                }
            } catch (err) {
                console.warn('Cloud fetch failed, using local data:', err);
            }
            return null;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'Unknown';
            const [year, month, day] = dateStr.split('-');
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return `${months[parseInt(month)-1]} ${parseInt(day)}, ${year}`;
        }

        async function loadLeaderboard() {
            const loadingEl = document.getElementById('loadingState');
            const podiumEl = document.getElementById('podiumContainer');
            const listEl = document.getElementById('listContainer');
            const emptyEl = document.getElementById('emptyState');

            // Show loading
            loadingEl.style.display = 'block';
            podiumEl.style.display = 'none';
            listEl.style.display = 'none';
            emptyEl.style.display = 'none';

            // Try cloud first
            let leaderboard = await fetchCloudLeaderboard();
            
            // Fallback to local
            if (!leaderboard) {
                leaderboard = JSON.parse(localStorage.getItem('wordQuest_GlobalLeaderboard') || '{}');
                document.getElementById('cloudStatus').textContent = '💾 LOCAL — Offline Rankings';
                document.getElementById('cloudStatus').style.background = 'rgba(255, 184, 0, 0.1)';
                document.getElementById('cloudStatus').style.color = 'var(--accent-gold)';
                document.getElementById('cloudStatus').style.borderColor = 'rgba(255, 184, 0, 0.3)';
            }

            // Convert to sorted array
            const players = Object.keys(leaderboard).map(name => ({
                name: name,
                score: leaderboard[name].score || 0,
                lastPlayed: leaderboard[name].lastPlayed || ''
            })).sort((a, b) => b.score - a.score);

            // Hide loading
            loadingEl.style.display = 'none';

            // Empty state
            if (players.length === 0) {
                emptyEl.style.display = 'block';
                updateStats(0, 0, 0);
                return;
            }

            // Update stats
            const topScore = players[0].score;
            const avgScore = Math.round(players.reduce((sum, p) => sum + p.score, 0) / players.length);
            updateStats(players.length, topScore, avgScore);

            // Show podium for top 3
            if (players.length >= 2) {
                podiumEl.style.display = 'block';
                renderPodium(players.slice(0, Math.min(3, players.length)));
            }

            // Show full list
            listEl.style.display = 'block';
            renderList(players);

            // Update timestamp
            const now = new Date();
            document.getElementById('lastUpdated').textContent = 
                `Last updated: ${now.toLocaleTimeString()}`;
        }

        function updateStats(total, top, avg) {
            document.getElementById('totalPlayers').textContent = total;
            document.getElementById('topScore').textContent = top;
            document.getElementById('avgScore').textContent = avg;
        }

        function renderPodium(topPlayers) {
            const medals = ['🥇', '🥈', '🥉'];
            const classes = ['gold', 'silver', 'bronze'];
            
            const podiumHTML = topPlayers.map((player, i) => `
                <div class="podium-card ${classes[i]}">
                    <div class="podium-medal">${medals[i]}</div>
                    <div class="podium-name">🧙 ${player.name}</div>
                    <div class="podium-score">${player.score} pts</div>
                    <div class="podium-label">${formatDate(player.lastPlayed)}</div>
                </div>
            `).join('');

            document.getElementById('podium').innerHTML = podiumHTML;
        }

        function renderList(players) {
            const listHTML = players.map((player, i) => {
                const rank = i + 1;
                let rankDisplay = rank;
                if (rank === 1) rankDisplay = '🥇';
                else if (rank === 2) rankDisplay = '🥈';
                else if (rank === 3) rankDisplay = '🥉';

                return `
                    <div class="player-row">
                        <div class="rank">${rankDisplay}</div>
                        <div class="player-info">
                            <div class="player-name">🧙 ${player.name}</div>
                            <div class="player-date">${formatDate(player.lastPlayed)}</div>
                        </div>
                        <div class="player-score">${player.score} pts</div>
                    </div>
                `;
            }).join('');

            document.getElementById('playerList').innerHTML = listHTML;
            document.getElementById('listTitle').textContent = 
                players.length > 3 ? 'All Wizards' : 'Wizards';
        }

        // Auto-load on page load
        loadLeaderboard();

        // Auto-refresh every 30 seconds
        setInterval(loadLeaderboard, 30000);
    </script>
</body>
</html>
